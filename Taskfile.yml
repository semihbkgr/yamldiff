version: "3"

vars:
  BUILD_VERSION: ""
  LDFLAGS: -s -w -X github.com/semihbkgr/yamldiff/cmd.buildVersion={{.BUILD_VERSION}}

tasks:
  build:
    desc: Build the yamldiff binary
    cmds:
      - go build -v --ldflags='{{.LDFLAGS}}' .

  test:
    desc: Run tests (pass COVER=true for coverage)
    cmds:
      - go test -count 1 {{if eq .COVER "true"}}-cover{{end}} ./...

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  wasm:build:
    desc: Build the WASM binary and copy the JS runtime into web/
    cmds:
      - GOOS=js GOARCH=wasm go build -o web/yamldiff.wasm ./cmd/wasm
      - cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/

  wasm:serve:
    desc: Serve the WASM website on http://localhost:8080
    dir: web
    cmds:
      - python3 -m http.server 8080
